services:
  db:
    image: pgvector/pgvector:pg16
    container_name: postgres-db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - ./postgres_data:/var/lib/postgresql/data

  api:
    build: .
    container_name: capstone-api
    restart: always
    env_file: .env
    environment:
      DB_HOST: db
      DB_PORT: 5432
    depends_on:
      - db
    ports:
      - "8000:8000"
    command: uv run uvicorn app.main:app --host 0.0.0.0 --port 8000

  incident-worker:
    build: .
    container_name: capstone-incident-worker
    restart: always
    env_file: .env
    environment:
      DB_HOST: db
      DB_PORT: 5432
    depends_on:
      - db
    command: uv run python -m app.workers.incident_agent_worker

  response-plan-worker:
    build: .
    container_name: capstone-response-plan-worker
    restart: always
    env_file: .env
    environment:
      DB_HOST: db
      DB_PORT: 5432
    depends_on:
      - db
    command: uv run python -m app.workers.response_plan_agent_worker
